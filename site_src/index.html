<!DOCTYPE>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <title>Document</title>
    <style>
        .replay {
            display: grid;
            grid-template-columns: auto 8em 8em 1fr;
            gap: 1em;
            margin-bottom: 2em;
        }

        .replay h3 {
            grid-column: 1 / -1;
            margin-bottom: 0.5em;
        }

        .replay .header {
            font-weight: bold;
        }

        .replay>.description {
            grid-column: 1 / -1;
            padding: 1em;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>
    {{#replays}}
    <div class="replay">
        replay goes here
    </div>
    {{/replays}}
</body>

</html>

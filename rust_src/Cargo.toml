[package]
name = "alti-reader"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "alti-index"
path = "src/alti-index.rs"

[dependencies]
prost = "0.12"
prost-types = "0.12"
bytes = "1.5"
duckdb = { version = "0.8", features = ["bundled"] }
chrono = "0.4"
walkdir = "2.4"
flate2 = "1.0"
anyhow = "1.0"

[build-dependencies]
prost-build = "0.12"

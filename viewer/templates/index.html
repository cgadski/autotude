<!doctype html>
<html>
    <head>
        <title>Replays</title>
        <style>
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th,
            td {
                padding: 8px;
                text-align: left;
                border-bottom: 1px solid #ddd;
            }
            tr:hover {
                background-color: #f5f5f5;
            }
            td.stem {
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <h1>Replays</h1>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Map</th>
                    <th>Duration</th>
                    <th>Kills</th>
                    <th>Actions</th>
                    <th>Stem</th>
                </tr>
            </thead>
            <tbody>
                {% for replay in replays %}
                <tr>
                    <td class="datetime">{{ replay.datetime }}</td>
                    <td>{{ replay.map }}</td>
                    <td>{{ replay.duration }}</td>
                    <td>{{ replay.kills }}</td>
                    <td>
                        <a href="/view?f={{ replay.stem }}.pb">View Replay</a>
                    </td>
                    <td class="stem">{{ replay.stem }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </body>
</html>
